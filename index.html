<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>THE CALL OF CTHULHU · 守秘人圣柜</title>
    <!-- 字体 -->
    <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Cormorant+Garamond:wght@400;600;700&family=Special+Elite&display=swap" rel="stylesheet">
    <!-- 可拖拽库 -->
    <script src="https://cdn.jsdelivr.net/npm/interactjs@1.10.11/dist/interact.min.js"></script>
    <style>
        /* ========== 全局样式 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cormorant Garamond', 'Times New Roman', serif;
        }

        body {
            position: relative;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            background: #0a0704;
            overflow-x: hidden;
        }
        
        /* 触手和眼睛背景 */
        .tentacle-left {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: 150px;
            pointer-events: none;
            z-index: 1;
            opacity: 0.25;
            background: radial-gradient(ellipse at 0% 50%, transparent 30%, #b48b4a10 70%);
            filter: blur(1px);
        }
        
        .tentacle-left::before {
            content: '';
            position: absolute;
            left: 0;
            top: 10%;
            width: 100px;
            height: 200px;
            background: repeating-linear-gradient(45deg, 
                transparent 0px, 
                transparent 10px, 
                #b48b4a20 10px, 
                #b48b4a30 12px);
            transform: rotate(15deg);
            border-radius: 50%;
            filter: blur(2px);
        }
        
        .tentacle-left::after {
            content: '';
            position: absolute;
            left: 20px;
            bottom: 20%;
            width: 120px;
            height: 180px;
            background: repeating-linear-gradient(-30deg, 
                transparent 0px, 
                transparent 15px, 
                #b48b4a20 15px, 
                #b48b4a30 18px);
            transform: rotate(-10deg);
            border-radius: 40%;
            filter: blur(2px);
        }

        .tentacle-right {
            position: fixed;
            right: 0;
            top: 0;
            bottom: 0;
            width: 150px;
            pointer-events: none;
            z-index: 1;
            opacity: 0.25;
            background: radial-gradient(ellipse at 100% 50%, transparent 30%, #b48b4a10 70%);
            filter: blur(1px);
        }
        
        .tentacle-right::before {
            content: '';
            position: absolute;
            right: 0;
            top: 15%;
            width: 100px;
            height: 220px;
            background: repeating-linear-gradient(-45deg, 
                transparent 0px, 
                transparent 12px, 
                #b48b4a20 12px, 
                #b48b4a30 15px);
            transform: rotate(-15deg);
            border-radius: 50%;
            filter: blur(2px);
        }
        
        .tentacle-right::after {
            content: '';
            position: absolute;
            right: 20px;
            bottom: 25%;
            width: 130px;
            height: 160px;
            background: repeating-linear-gradient(30deg, 
                transparent 0px, 
                transparent 18px, 
                #b48b4a20 18px, 
                #b48b4a30 22px);
            transform: rotate(10deg);
            border-radius: 40%;
            filter: blur(2px);
        }

        .eye-left {
            position: fixed;
            left: 30px;
            top: 30%;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #b48b4a80 0%, transparent 70%);
            border: 2px solid #b48b4a30;
            pointer-events: none;
            z-index: 1;
            opacity: 0.2;
            animation: eyeMove 12s infinite alternate ease-in-out;
        }
        
        .eye-right {
            position: fixed;
            right: 30px;
            bottom: 30%;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: radial-gradient(circle at 70% 70%, #b48b4a80 0%, transparent 70%);
            border: 2px solid #b48b4a30;
            pointer-events: none;
            z-index: 1;
            opacity: 0.2;
            animation: eyeMove 15s infinite alternate-reverse ease-in-out;
        }

        @keyframes eyeMove {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(10px, -10px) scale(1.1); }
        }

        .reliquary {
            max-width: 1400px;
            width: 100%;
            background: #1c1712e6;
            backdrop-filter: blur(2px);
            border: 2px solid #b48b4a;
            box-shadow: 
                0 20px 40px -12px #000000,
                inset 0 0 0 1px #4f4437,
                0 0 0 4px #0b0907,
                0 0 30px #b48b4a20;
            padding: 0;
            position: relative;
            z-index: 10;
        }

        /* 标题区 */
        .title-block {
            background: #0a0806;
            border-bottom: 3px solid #b48b4a;
            padding: 40px 32px 32px 32px;
        }

        .main-title {
            font-family: 'UnifrakturMaguntia', cursive;
            font-size: 5.5rem;
            font-weight: 400;
            color: #b48b4a;
            line-height: 1.2;
            margin-bottom: 8px;
            text-shadow: 3px 3px 0 #2f241a, 0 0 20px #b48b4a60;
            border-left: 4px solid #b48b4a;
            padding-left: 32px;
            text-transform: uppercase;
            letter-spacing: -1px;
            word-spacing: 15px;
        }

        .keeper-area {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-top: 16px;
            border-top: 1px dashed #4f4437;
            padding-top: 20px;
        }
        .keeper-label {
            color: #b48b4a;
            font-size: 1.1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-family: 'Special Elite', cursive;
        }
        .keeper-name-display {
            font-family: 'Special Elite', cursive;
            color: #d9c49b;
            font-size: 1.3rem;
            padding: 4px 8px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.3s;
        }
        .keeper-name-display:hover { 
            color: #b48b4a;
            border-bottom-color: #b48b4a;
        }
        .keeper-name-input {
            background: transparent;
            border: none;
            border-bottom: 2px solid #b48b4a;
            color: #b48b4a;
            font-size: 1.3rem;
            padding: 4px 8px;
            width: 300px;
            font-family: 'Special Elite', cursive;
            outline: none;
            display: none;
        }

        .tab-bar {
            display: flex;
            margin: 0 24px 24px 24px;
            border-bottom: 2px solid #4f4437;
            flex-wrap: wrap;
        }
        .tab-btn {
            background: transparent;
            border: none;
            padding: 14px 24px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #9b8b74;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            border-right: 1px solid #4f4437;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .tab-btn::before {
            content: '';
            position: absolute;
            top: var(--y, 50%);
            left: var(--x, 50%);
            width: 0;
            height: 0;
            border-radius: 50%;
            background: radial-gradient(circle at center, #b48b4a80, transparent 70%);
            transform: translate(-50%, -50%);
            transition: width 0.3s, height 0.3s;
            pointer-events: none;
            z-index: 0;
        }
        .tab-btn:hover::before {
            width: 200px;
            height: 200px;
        }
        .tab-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border: 1px solid transparent;
            transition: border-color 0.3s;
            pointer-events: none;
        }
        .tab-btn:hover::after {
            border-color: #b48b4a;
        }
        .tab-btn:hover {
            color: #dbb45c;
        }
        .tab-btn.active {
            color: #b48b4a;
        }

        .page { display: none; padding: 0 24px 24px 24px; }
        .page.active-page { display: block; }

        .section-header {
            margin-bottom: 24px;
            border-left: 8px solid #b48b4a;
            padding: 8px 0 8px 20px;
            background: linear-gradient(90deg, #2a241e 0%, transparent 100%);
        }
        .section-header h2 {
            font-size: 2.2rem;
            font-weight: 700;
            color: #d9c49b;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        input, select, textarea {
            background: #0f0d0a;
            border: 2px solid #4f4437;
            padding: 10px 14px;
            color: #e0d3c0;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s;
        }
        input:focus, select:focus, textarea:focus {
            border-color: #b48b4a;
            box-shadow: 0 0 15px #b48b4a40;
        }

        .btn {
            background: #2f281f;
            border: none;
            padding: 10px 22px;
            font-weight: 700;
            color: #e0d3c0;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .btn::before {
            content: '';
            position: absolute;
            top: var(--y, 50%);
            left: var(--x, 50%);
            width: 0;
            height: 0;
            border-radius: 50%;
            background: radial-gradient(circle at center, #b48b4a80, transparent 70%);
            transform: translate(-50%, -50%);
            transition: width 0.4s, height 0.4s;
            pointer-events: none;
            z-index: 0;
        }
        .btn:hover::before {
            width: 300px;
            height: 300px;
        }
        .btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border: 1px solid transparent;
            transition: border-color 0.3s;
            pointer-events: none;
        }
        .btn:hover::after {
            border-color: #b48b4a;
        }
        .btn:hover {
            color: #ffffff;
        }

        .delete-btn, .edit-btn {
            background: none;
            border: none;
            color: #9b8b74;
            width: 36px;
            height: 36px;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .delete-btn::before, .edit-btn::before {
            content: '';
            position: absolute;
            top: var(--y, 50%);
            left: var(--x, 50%);
            width: 0;
            height: 0;
            border-radius: 50%;
            background: radial-gradient(circle at center, #b48b4a80, transparent 70%);
            transform: translate(-50%, -50%);
            transition: width 0.3s, height 0.3s;
            pointer-events: none;
        }
        .delete-btn:hover::before, .edit-btn:hover::before {
            width: 80px;
            height: 80px;
        }
        .delete-btn::after, .edit-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border: 1px solid transparent;
            transition: border-color 0.3s;
            pointer-events: none;
        }
        .delete-btn:hover::after, .edit-btn:hover::after {
            border-color: #b48b4a;
        }
        .delete-btn:hover {
            color: #b48b4a;
            transform: rotate(90deg) scale(1.1);
        }
        .edit-btn:hover {
            color: #b48b4a;
            transform: scale(1.1);
        }

        .filter-bar {
            display: flex;
            gap: 16px;
            align-items: center;
            margin-bottom: 24px;
            background: #16120e;
            border: 2px solid #4f4437;
            padding: 16px 20px;
        }

        .module-list-container {
            background: #16120e;
            border: 2px solid #4f4437;
            padding: 20px;
            min-height: 300px;
        }

        .module-item {
            background: #1f1b16;
            border: 2px solid #4f4437;
            padding: 16px;
            margin-bottom: 12px;
            transition: all 0.3s;
        }
        .module-item:hover {
            border-color: #b48b4a;
            transform: translateX(5px);
            box-shadow: -5px 5px 15px #00000080;
        }

        .module-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .module-name {
            font-size: 1.5rem;
            color: #d9c49b;
        }

        .tag-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-left: auto;
            max-width: 60%;
        }
        .tag {
            background: #2a241e;
            border: 1px solid #b48b4a;
            padding: 4px 14px;
            color: #b48b4a;
            text-transform: uppercase;
            font-size: 0.8rem;
            border-radius: 30px;
            transition: all 0.3s;
            white-space: nowrap;
        }
        .tag:hover {
            background: #b48b4a;
            color: #1f1b16;
            transform: scale(1.1);
        }

        .module-detail {
            margin-top: 12px;
        }
        .detail-row {
            display: flex;
            gap: 12px;
            margin: 6px 0;
            word-break: break-word;
        }
        .detail-label {
            color: #b48b4a;
            min-width: 60px;
        }
        .detail-content {
            color: #b8aa94;
            flex: 1;
        }

        .button-group {
            display: flex;
            gap: 4px;
        }

        /* 日历页面样式 */
        .calendar-stats {
            display: flex;
            gap: 24px;
            margin-bottom: 24px;
            background: #16120e;
            border: 2px solid #4f4437;
            padding: 20px;
        }
        .stat-card {
            flex: 1;
            text-align: center;
            border-left: 3px solid #b48b4a;
            padding: 12px;
            transition: all 0.3s;
        }
        .stat-card:hover {
            transform: scale(1.05);
            border-left-color: #dbb45c;
            background: #2a241e60;
        }
        .stat-label {
            color: #b48b4a;
            font-size: 0.9rem;
            text-transform: uppercase;
        }
        .stat-value {
            color: #d9c49b;
            font-size: 2rem;
            font-family: 'Special Elite', cursive;
        }
        
        .chart-container {
            background: #16120e;
            border: 2px solid #4f4437;
            padding: 20px;
            margin-bottom: 24px;
        }
        .chart-title {
            color: #b48b4a;
            margin-bottom: 16px;
            font-size: 1.2rem;
        }
        .chart-wrapper {
            width: 100%;
            height: 220px;
            position: relative;
        }
        #monthChart {
            width: 100%;
            height: 100%;
            display: block;
        }
        
        .calendar-list {
            background: #16120e;
            border: 2px solid #4f4437;
            padding: 20px;
            max-height: 400px;
            overflow-y: auto;
        }
        .calendar-item {
            background: #1f1b16;
            border: 2px solid #4f4437;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }
        .calendar-item:hover {
            border-color: #b48b4a;
            transform: translateX(5px);
        }
        .calendar-date { color: #b48b4a; }
        .calendar-duration { color: #d9c49b; }
        .calendar-module { color: #9b8b74; }

        /* 成就页面样式 */
        .achievement-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }
        .achievement-card {
            background: #1f1b16;
            border: 2px solid #4f4437;
            padding: 20px;
            position: relative;
            display: flex;
            gap: 16px;
            transition: all 0.3s;
        }
        .achievement-card:hover {
            border-color: #b48b4a;
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 10px 20px #00000080;
        }
        .achievement-icon {
            width: 64px;
            height: 64px;
            background: #2a241e;
            border: 2px solid #b48b4a;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
        }
        .achievement-card:hover .achievement-icon {
            transform: rotate(360deg);
            border-color: #dbb45c;
        }
        .achievement-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .achievement-content {
            flex: 1;
        }
        .achievement-name {
            font-size: 1.3rem;
            font-weight: 700;
            color: #d9c49b;
            margin-bottom: 4px;
        }
        .achievement-desc {
            color: #b8aa94;
            font-size: 0.9rem;
            margin-bottom: 8px;
            font-style: italic;
        }
        .achievement-source {
            color: #b48b4a;
            font-size: 0.85rem;
        }
        .achievement-time {
            color: #9b8b74;
            font-size: 0.8rem;
            font-family: 'Special Elite', cursive;
        }

        /* 角色卡片样式 */
        .char-double {
            display: grid;
            grid-template-columns: 1.2fr 2fr;
            gap: 24px;
        }
        .char-card {
            background: #1f1b16;
            border: 2px solid #4f4437;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            gap: 16px;
            align-items: flex-start;
            transition: all 0.3s;
        }
        .char-card:hover {
            border-color: #b48b4a;
            transform: translateX(5px);
            box-shadow: -5px 5px 15px #00000080;
        }
        .char-avatar {
            width: 70px;
            height: 70px;
            background: #2a241e;
            border: 3px solid #4f4437;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            color: #b48b4a;
            font-size: 2rem;
        }
        .char-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .char-info {
            flex: 1;
        }
        .char-name {
            font-size: 1.5rem;
            color: #d9c49b;
            margin-bottom: 8px;
        }
        .char-stats {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 8px 0;
        }
        .stat-badge {
            background: #2a241e;
            border: 1px solid #4f4437;
            padding: 4px 10px;
            color: #e0d3c0;
            font-size: 0.85rem;
        }
        .stat-badge:hover {
            border-color: #b48b4a;
            color: #b48b4a;
            transform: scale(1.1);
        }
        .char-quote {
            color: #b48b4a;
            font-style: italic;
            border-left: 3px solid #b48b4a;
            padding-left: 12px;
            margin: 8px 0;
        }
        .char-modules {
            color: #9b8b74;
            font-size: 0.9rem;
        }

        /* 线索板样式 */
        .board-container {
            display: flex;
            gap: 24px;
            height: 700px;
        }
        .board-sidebar {
            width: 280px;
            background: #16120e;
            border: 2px solid #4f4437;
            padding: 16px;
            overflow-y: auto;
        }
        .board-item {
            background: #1f1b16;
            border: 2px solid #4f4437;
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            color: #b8aa94;
            transition: all 0.3s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .board-item:hover {
            border-color: #b48b4a;
            background: #2a241e;
        }
        .board-item.active {
            border-color: #b48b4a;
            color: #d9c49b;
            background: #2a241e;
        }
        .board-delete {
            background: none;
            border: none;
            color: #9b8b74;
            cursor: pointer;
            font-size: 1.2rem;
            padding: 0 4px;
        }
        .board-delete:hover {
            color: #b48b4a;
            transform: scale(1.2);
        }
        .board-canvas-container {
            flex: 1;
            background: #1a1612;
            border: 2px solid #4f4437;
            position: relative;
            overflow: auto;
        }
        
        #boardCanvas {
            width: 2000px;
            height: 2000px;
            background: #1a1612;
            position: relative;
            overflow: hidden;
        }

        .note-item {
            position: absolute;
            width: 200px;
            background: #2a241e;
            border: 2px solid #b48b4a;
            padding: 12px;
            cursor: move;
            color: #e0d3c0;
            box-shadow: 4px 4px 0 #0f0d0a;
            z-index: 10;
            transition: all 0.3s;
        }
        .note-item:hover {
            border-color: #dbb45c;
            box-shadow: 0 0 20px #b48b4a80;
        }
        .note-item textarea {
            width: 100%;
            background: transparent;
            border: none;
            color: #e0d3c0;
            resize: none;
            min-height: 60px;
        }

        .connection-line {
            position: absolute;
            background: #b48b4a;
            height: 2px;
            transform-origin: 0 0;
            pointer-events: none;
            opacity: 0.5;
            z-index: 5;
        }

        /* 外链样式 */
        .link-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }
        .link-tile {
            background: #1f1b16;
            border: 2px solid #4f4437;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s;
            min-width: 0;
        }
        .link-tile:hover {
            border-color: #b48b4a;
            transform: translateY(-5px);
        }
        .link-icon {
            font-size: 2rem;
            color: #b48b4a;
            flex-shrink: 0;
        }
        .link-info {
            flex: 1;
            min-width: 0;
        }
        .link-info a {
            color: #d9c49b;
            text-decoration: none;
            display: block;
            word-break: break-all;
            white-space: normal;
            overflow-wrap: break-word;
        }
        .link-info div {
            color: #9b8b74;
            font-size: 0.7rem;
            word-break: break-all;
            white-space: normal;

<script>
    (function() {
        // 鼠标光晕效果
        function setupMouseGlow() {
            const buttons = document.querySelectorAll('.btn, .tab-btn, .delete-btn, .edit-btn, .board-delete');
            buttons.forEach(btn => {
                btn.addEventListener('mousemove', (e) => {
                    const rect = btn.getBoundingClientRect();
                    const x = ((e.clientX - rect.left) / rect.width) * 100;
                    const y = ((e.clientY - rect.top) / rect.height) * 100;
                    btn.style.setProperty('--x', x + '%');
                    btn.style.setProperty('--y', y + '%');
                });
            });
        }

        // 数据定义
        let modules = [];
        let characters = [];
        let links = [];
        let calendar = [];
        let achievements = [];
        let boards = [];
        let currentBoardId = null;
        let connectMode = false;
        let selectedNote = null;
        let editingModuleIndex = -1;

        // 守秘人名字
        const keeperDisplay = document.getElementById('keeperDisplay');
        const keeperInput = document.getElementById('keeperInput');

        keeperDisplay.addEventListener('click', () => {
            keeperDisplay.style.display = 'none';
            keeperInput.style.display = 'inline-block';
            keeperInput.value = keeperDisplay.textContent;
            keeperInput.focus();
        });

        keeperInput.addEventListener('blur', () => {
            keeperDisplay.style.display = 'inline-block';
            keeperInput.style.display = 'none';
            keeperDisplay.textContent = keeperInput.value || '无名守秘人';
            saveToStorage();
        });

        keeperInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') keeperInput.blur();
        });

        // 加载数据
        function loadFromStorage() {
            try {
                const savedModules = localStorage.getItem('coc_modules');
                const savedChars = localStorage.getItem('coc_characters');
                const savedLinks = localStorage.getItem('coc_links');
                const savedCalendar = localStorage.getItem('coc_calendar');
                const savedAchievements = localStorage.getItem('coc_achievements');
                const savedBoards = localStorage.getItem('coc_boards');
                const savedKeeper = localStorage.getItem('coc_keeper');
                
                if (savedModules) modules = JSON.parse(savedModules);
                if (savedChars) characters = JSON.parse(savedChars);
                if (savedLinks) links = JSON.parse(savedLinks);
                if (savedCalendar) calendar = JSON.parse(savedCalendar);
                if (savedAchievements) achievements = JSON.parse(savedAchievements);
                if (savedBoards) boards = JSON.parse(savedBoards);
                if (savedKeeper) {
                    keeperDisplay.textContent = savedKeeper;
                    keeperInput.value = savedKeeper;
                }
            } catch (e) {
                console.warn('加载失败', e);
            }
            
            // 初始化示例数据（仅当完全为空时）
            if (modules.length === 0) {
                modules.push({ name: '暗黑边缘', status: 'done', background: '经典入门模组', comment: '气氛很好', tags: ['经典'] });
            }
            if (links.length === 0) {
                links.push({ name: '骰子机器人', url: 'https://trpg.dice.bot' });
            }
            if (boards.length === 0) {
                boards.push({ id: 'board1', name: '初梦', notes: [], connections: [] });
                currentBoardId = 'board1';
            } else {
                currentBoardId = boards[0]?.id || null;
            }
        }

        function saveToStorage() {
            localStorage.setItem('coc_modules', JSON.stringify(modules));
            localStorage.setItem('coc_characters', JSON.stringify(characters));
            localStorage.setItem('coc_links', JSON.stringify(links));
            localStorage.setItem('coc_calendar', JSON.stringify(calendar));
            localStorage.setItem('coc_achievements', JSON.stringify(achievements));
            localStorage.setItem('coc_boards', JSON.stringify(boards));
            localStorage.setItem('coc_keeper', keeperDisplay.textContent);
        }

        // ========== 模组相关函数 ==========
        function renderModules() {
            const container = document.getElementById('moduleListContainer');
            if (!container) return;
            const filter = document.getElementById('statusFilter')?.value || 'all';
            let filtered = filter === 'all' ? modules : modules.filter(m => m.status === filter);
            
            container.innerHTML = '';
            filtered.forEach((mod) => {
                const actualIdx = modules.indexOf(mod);
                const div = document.createElement('div');
                div.className = 'module-item';
                
                let tagsHtml = '';
                if (mod.tags && mod.tags.length) {
                    tagsHtml = `<div class="tag-group">` + 
                        mod.tags.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('') + 
                        `</div>`;
                }
                
                div.innerHTML = `
                    <div class="module-header">
                        <span class="module-name">${escapeHtml(mod.name)}</span>
                        ${tagsHtml}
                        <div class="button-group">
                            <button class="edit-btn" onclick="editModule(${actualIdx})">✎</button>
                            <button class="delete-btn" onclick="deleteModule(${actualIdx})">✕</button>
                        </div>
                    </div>
                    <div class="module-detail">
                        <div class="detail-row"><span class="detail-label">背景</span><span class="detail-content">${escapeHtml(mod.background || '-')}</span></div>
                        <div class="detail-row"><span class="detail-label">吐槽</span><span class="detail-content">${escapeHtml(mod.comment || '-')}</span></div>
                        <div class="detail-row"><span class="detail-label">状态</span><span class="detail-content">${mod.status === 'wish' ? '愿望单' : mod.status === 'ongoing' ? '进行中' : mod.status === 'done' ? '已完成' : '未进行'}</span></div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        window.editModule = (index) => {
            const mod = modules[index];
            document.getElementById('moduleNameInput').value = mod.name || '';
            document.getElementById('moduleStatusSelect').value = mod.status || 'wish';
            document.getElementById('moduleTagInput').value = (mod.tags || []).join(', ');
            document.getElementById('moduleBackground').value = mod.background || '';
            document.getElementById('moduleComment').value = mod.comment || '';
            
            editingModuleIndex = index;
            document.getElementById('addModuleBtn').textContent = '更新';
            document.getElementById('cancelEditBtn').style.display = 'block';
        };

        window.deleteModule = (index) => {
            modules.splice(index, 1);
            saveToStorage();
            renderModules();
        };

        document.getElementById('cancelEditBtn')?.addEventListener('click', () => {
            clearModuleForm();
        });

        function clearModuleForm() {
            document.getElementById('moduleNameInput').value = '';
            document.getElementById('moduleTagInput').value = '';
            document.getElementById('moduleBackground').value = '';
            document.getElementById('moduleComment').value = '';
            document.getElementById('moduleStatusSelect').value = 'wish';
            
            editingModuleIndex = -1;
            document.getElementById('addModuleBtn').textContent = '铭刻';
            document.getElementById('cancelEditBtn').style.display = 'none';
        }

        document.getElementById('addModuleBtn')?.addEventListener('click', () => {
            const name = document.getElementById('moduleNameInput').value.trim();
            if (!name) return;
            
            const tagStr = document.getElementById('moduleTagInput').value.trim();
            let tags = tagStr ? tagStr.split(',').map(s => s.trim()).filter(s => s) : [];
            
            const moduleData = {
                name: name,
                status: document.getElementById('moduleStatusSelect').value,
                background: document.getElementById('moduleBackground').value.trim(),
                comment: document.getElementById('moduleComment').value.trim(),
                tags: tags
            };
            
            if (editingModuleIndex >= 0) {
                modules[editingModuleIndex] = moduleData;
                clearModuleForm();
            } else {
                modules.push(moduleData);
            }
            
            saveToStorage();
            renderModules();
            clearModuleForm();
        });

        document.getElementById('statusFilter')?.addEventListener('change', renderModules);

        // ========== 角色相关函数 ==========
        const statKeys = ['力量','敏捷','意志','智力','体型','教育','幸运','外貌','理智'];
        const nineDiv = document.getElementById('nineStats');
        if (nineDiv) {
            statKeys.forEach(s => {
                const w = document.createElement('div');
                w.className = 'stat-item';
                w.style.cssText = 'background:#0f0d0a; border:2px solid #4f4437; padding:10px; text-align:center;';
                w.innerHTML = `<label style="color:#b48b4a;">${s}</label><input type="number" class="stat-input" data-stat="${s}" value="50" min="1" style="width:80px; text-align:center; margin-top:4px; background:#0f0d0a; border:2px solid #4f4437; color:#e0d3c0;">`;
                nineDiv.appendChild(w);
            });
        }

        function renderCharacters() {
            const container = document.getElementById('charListContainer');
            if (!container) return;
            container.innerHTML = '';
            characters.forEach((ch, idx) => {
                const card = document.createElement('div');
                card.className = 'char-card';
                
                let statsHtml = '';
                for (let key in ch.stats) {
                    statsHtml += `<span class="stat-badge">${key} ${ch.stats[key]}</span>`;
                }
                
                card.innerHTML = `
                    <div class="char-avatar">
                        ${ch.avatarData ? `<img src="${ch.avatarData}">` : '◈'}
                    </div>
                    <div class="char-info">
                        <div class="char-name">${escapeHtml(ch.name)}</div>
                        <div class="char-stats">${statsHtml}</div>
                        <div class="char-quote">“${escapeHtml(ch.quote || '')}”</div>
                        <div class="char-modules">跑过: ${escapeHtml(ch.modules || '无')}</div>
                    </div>
                    <button class="delete-btn" onclick="deleteCharacter(${idx})">✕</button>
                `;
                container.appendChild(card);
            });
        }

        window.deleteCharacter = (index) => {
            characters.splice(index, 1);
            saveToStorage();
            renderCharacters();
        };

        document.getElementById('addManualCharBtn')?.addEventListener('click', () => {
            const name = prompt('输入调查员姓名', '新调查员');
            if (!name) return;
            const statInputs = document.querySelectorAll('.stat-input');
            let stats = {};
            statInputs.forEach(inp => stats[inp.dataset.stat] = parseInt(inp.value) || 50);
            const quote = document.getElementById('charQuote').value.trim() || '';
            const modulesPlayed = document.getElementById('charModules').value.trim() || '';
            const avatarFile = document.getElementById('avatarUpload').files[0];
            
            if (avatarFile) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    characters.push({ name, stats, quote, modules: modulesPlayed, avatarData: e.target.result });
                    saveToStorage();
                    renderCharacters();
                };
                reader.readAsDataURL(avatarFile);
            } else {
                characters.push({ name, stats, quote, modules: modulesPlayed, avatarData: null });
                saveToStorage();
                renderCharacters();
            }
            document.getElementById('charQuote').value = '';
            document.getElementById('charModules').value = '';
            document.getElementById('avatarUpload').value = '';
        });

        // ========== 日历相关函数 ==========
        function updateCalendarStats() {
            const now = new Date();
            const thisMonth = now.getMonth();
            const thisYear = now.getFullYear();
            const thisQuarter = Math.floor(thisMonth / 3);

            let monthHours = 0, quarterHours = 0, yearHours = 0;
            calendar.forEach(entry => {
                const d = new Date(entry.date);
                if (d.getFullYear() === thisYear) {
                    yearHours += entry.hours;
                    if (d.getMonth() === thisMonth) monthHours += entry.hours;
                    if (Math.floor(d.getMonth() / 3) === thisQuarter) quarterHours += entry.hours;
                }
            });

            document.getElementById('statMonth').textContent = monthHours + ' 小时';
            document.getElementById('statQuarter').textContent = quarterHours + ' 小时';
            document.getElementById('statYear').textContent = yearHours + ' 小时';
            
            drawChart();
        }

        function drawChart() {
            const canvas = document.getElementById('monthChart');
            if (!canvas) return;
            
            const ctx = canvas.getContext('2d');
            const container = canvas.parentElement;
            const width = container.clientWidth;
            const height = container.clientHeight;
            
            const dpr = window.devicePixelRatio || 1;
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            canvas.style.width = width + 'px';
            canvas.style.height = height + 'px';
            
            ctx.scale(dpr, dpr);
            
            const now = new Date();
            const months = [];
            const hours = [];
            
            for (let i = 11; i >= 0; i--) {
                const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
                const monthStr = d.toLocaleString('default', { month: 'short' });
                months.push(monthStr);
                
                let total = 0;
                calendar.forEach(entry => {
                    const entryDate = new Date(entry.date);
                    if (entryDate.getMonth() === d.getMonth() && entryDate.getFullYear() === d.getFullYear()) {
                        total += entry.hours;
                    }
                });
                hours.push(total);
            }

            const padding = { left: 50, right: 30, top: 30, bottom: 40 };
            const chartWidth = width - padding.left - padding.right;
            const chartHeight = height - padding.top - padding.bottom;
            const barWidth = (chartWidth - 20) / 12;
            const maxHours = Math.max(...hours, 1);
            
            ctx.clearRect(0, 0, width, height);
            
            ctx.strokeStyle = '#4f4437';
            ctx.lineWidth = 1;
            ctx.beginPath();
            for (let i = 0; i <= 5; i++) {
                const y = padding.top + (i * chartHeight / 5);
                ctx.moveTo(padding.left, y);
                ctx.lineTo(width - padding.right, y);
            }
            ctx.stroke();

            for (let i = 0; i < 12; i++) {
                const x = padding.left + i * barWidth + 15;
                const barHeight = (hours[i] / maxHours) * chartHeight;
                const y = height - padding.bottom - barHeight;
                
                const gradient = ctx.createLinearGradient(x, y, x, height - padding.bottom);
                gradient.addColorStop(0, '#dbb45c');
                gradient.addColorStop(1, '#b48b4a');
                
                ctx.fillStyle = gradient;
                ctx.fillRect(x, y, barWidth - 20, barHeight);
                
                ctx.fillStyle = '#9b8b74';
                ctx.font = '12px "Special Elite"';
                ctx.fillText(months[i], x, height - padding.bottom + 20);
                
                if (hours[i] > 0) {
                    ctx.fillStyle = '#d9c49b';
                    ctx.font = '10px "Special Elite"';
                    ctx.fillText(hours[i] + 'h', x + 5, y - 5);
                }
            }
        }

        function renderCalendar() {
            const container = document.getElementById('calendarListContainer');
            if (!container) return;
            container.innerHTML = '';
            calendar.sort((a,b) => new Date(b.date) - new Date(a.date)).forEach((entry, idx) => {
                const div = document.createElement('div');
                div.className = 'calendar-item';
                div.innerHTML = `
                    <span class="calendar-date">${entry.date}</span>
                    <span class="calendar-duration">${entry.hours} 小时</span>
                    <span class="calendar-module">${escapeHtml(entry.module || '')}</span>
                    <button class="delete-btn" onclick="deleteCalendar(${idx})">✕</button>
                `;
                container.appendChild(div);
            });
            updateCalendarStats();
        }

        window.deleteCalendar = (index) => {
            calendar.splice(index, 1);
            saveToStorage();
            renderCalendar();
        };

        document.getElementById('addCalendarBtn')?.addEventListener('click', () => {
            const date = document.getElementById('calendarDate').value;
            const hours = parseFloat(document.getElementById('calendarHours').value);
            const module = document.getElementById('calendarModule').value;
            if (!date || !hours) return;
            calendar.push({ date, hours, module });
            saveToStorage();
            renderCalendar();
            document.getElementById('calendarDate').value = '2026-03-17';
            document.getElementById('calendarHours').value = '2';
            document.getElementById('calendarModule').value = '';
        });

        // ========== 成就相关函数 ==========
        function renderAchievements() {
            const container = document.getElementById('achievementGridContainer');
            if (!container) return;
            container.innerHTML = '';
            achievements.forEach((ach, idx) => {
                const card = document.createElement('div');
                card.className = 'achievement-card';
                card.innerHTML = `
                    <div class="achievement-icon">
                        ${ach.icon ? `<img src="${ach.icon}" alt="徽记">` : '🏆'}
                    </div>
                    <div class="achievement-content">
                        <div class="achievement-name">${escapeHtml(ach.name)}</div>
                        <div class="achievement-desc">${escapeHtml(ach.desc || '')}</div>
                        <div class="achievement-source">来自: ${escapeHtml(ach.source || '未知')}</div>
                        <div class="achievement-time">${ach.date || ''}</div>
                    </div>
                    <button class="delete-btn" onclick="deleteAchievement(${idx})" style="position:absolute; top:10px; right:10px;">✕</button>
                `;
                container.appendChild(card);
            });
        }

        window.deleteAchievement = (index) => {
            achievements.splice(index, 1);
            saveToStorage();
            renderAchievements();
        };

        document.getElementById('addAchievementBtn')?.addEventListener('click', () => {
            const name = document.getElementById('achievementName').value.trim();
            if (!name) return;
            
            const iconFile = document.getElementById('achievementIcon').files[0];
            if (iconFile) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    achievements.push({
                        name: name,
                        desc: document.getElementById('achievementDesc').value.trim(),
                        source: document.getElementById('achievementSource').value.trim(),
                        date: document.getElementById('achievementDate').value,
                        icon: e.target.result
                    });
                    saveToStorage();
                    renderAchievements();
                };
                reader.readAsDataURL(iconFile);
            } else {
                achievements.push({
                    name: name,
                    desc: document.getElementById('achievementDesc').value.trim(),
                    source: document.getElementById('achievementSource').value.trim(),
                    date: document.getElementById('achievementDate').value
                });
                saveToStorage();
                renderAchievements();
            }
            document.getElementById('achievementName').value = '';
            document.getElementById('achievementDesc').value = '';
            document.getElementById('achievementSource').value = '';
            document.getElementById('achievementIcon').value = '';
        });

        // ========== 线索板相关函数 ==========
        function renderBoardList() {
            const container = document.getElementById('boardModuleList');
            if (!container) return;
            container.innerHTML = '';
            boards.forEach((board, idx) => {
                const div = document.createElement('div');
                div.className = `board-item ${board.id === currentBoardId ? 'active' : ''}`;
                div.innerHTML = `
                    <span onclick="selectBoard('${board.id}')" style="flex:1; cursor:pointer;">${escapeHtml(board.name)}</span>
                    <button class="board-delete" onclick="deleteBoard(${idx})">✕</button>
                `;
                container.appendChild(div);
            });
        }

        window.selectBoard = (id) => {
            currentBoardId = id;
            renderBoardList();
            renderCurrentBoard();
        };

        window.deleteBoard = (index) => {
            if (boards.length <= 1) {
                alert('至少保留一个梦境');
                return;
            }
            boards.splice(index, 1);
            currentBoardId = boards[0].id;
            renderBoardList();
            renderCurrentBoard();
            saveToStorage();
        };

        function renderCurrentBoard() {
            const canvas = document.getElementById('boardCanvas');
            if (!canvas) return;
            const board = boards.find(b => b.id === currentBoardId);
            if (!board) return;

            const notes = canvas.querySelectorAll('.note-item');
            notes.forEach(n => n.remove());
            
            board.notes.forEach(note => {
                const noteEl = document.createElement('div');
                noteEl.className = 'note-item';
                noteEl.id = `note-${note.id}`;
                noteEl.style.left = note.x + 'px';
                noteEl.style.top = note.y + 'px';
                noteEl.innerHTML = `<textarea placeholder="输入线索...">${escapeHtml(note.text || '')}</textarea>`;
                
                interact(noteEl).draggable({
                    inertia: false,
                    modifiers: [interact.modifiers.restrict({ restriction: 'parent' })],
                    listeners: {
                        move(event) {
                            const target = event.target;
                            const x = (parseFloat(target.style.left) || 0) + event.dx;
                            const y = (parseFloat(target.style.top) || 0) + event.dy;
                            target.style.left = x + 'px';
                            target.style.top = y + 'px';
                            
                            const noteId = target.id.replace('note-', '');
                            const noteData = board.notes.find(n => n.id === noteId);
                            if (noteData) {
                                noteData.x = x;
                                noteData.y = y;
                            }
                            renderConnections();
                            saveToStorage();
                        }
                    }
                });

                noteEl.addEventListener('click', (e) => {
                    if (connectMode) {
                        if (!selectedNote) {
                            selectedNote = noteEl.id;
                            noteEl.style.borderColor = '#dbb45c';
                        } else {
                            const fromId = selectedNote.replace('note-', '');
                            const toId = noteEl.id.replace('note-', '');
                            if (fromId !== toId) {
                                board.connections.push({ from: fromId, to: toId });
                                renderConnections();
                                saveToStorage();
                            }
                            selectedNote = null;
                            document.querySelectorAll('.note-item').forEach(n => n.style.borderColor = '#b48b4a');
                            connectMode = false;
                        }
                    } else {
                        if (confirm('删除这条线索？')) {
                            const noteId = noteEl.id.replace('note-', '');
                            board.notes = board.notes.filter(n => n.id !== noteId);
                            board.connections = board.connections.filter(c => c.from !== noteId && c.to !== noteId);
                            noteEl.remove();
                            renderConnections();
                            saveToStorage();
                        }
                    }
                });

                canvas.appendChild(noteEl);
            });

            renderConnections();
        }

        function renderConnections() {
            const canvas = document.getElementById('boardCanvas');
            const board = boards.find(b => b.id === currentBoardId);
            if (!board) return;

            document.querySelectorAll('.connection-line').forEach(el => el.remove());

            board.connections.forEach(conn => {
                const fromEl = document.getElementById(`note-${conn.from}`);
                const toEl = document.getElementById(`note-${conn.to}`);
                if (!fromEl || !toEl) return;

                const fromRect = fromEl.getBoundingClientRect();
                const toRect = toEl.getBoundingClientRect();
                const canvasRect = canvas.getBoundingClientRect();

                const x1 = fromRect.left + fromRect.width/2 - canvasRect.left + canvas.scrollLeft;
                const y1 = fromRect.top + fromRect.height/2 - canvasRect.top + canvas.scrollTop;
                const x2 = toRect.left + toRect.width/2 - canvasRect.left + canvas.scrollLeft;
                const y2 = toRect.top + toRect.height/2 - canvasRect.top + canvas.scrollTop;

                const length = Math.sqrt((x2-x1)*(x2-x1) + (y2-y1)*(y2-y1));
                const angle = Math.atan2(y2-y1, x2-x1) * 180 / Math.PI;

                const line = document.createElement('div');
                line.className = 'connection-line';
                line.style.left = x1 + 'px';
                line.style.top = y1 + 'px';
                line.style.width = length + 'px';
                line.style.transform = `rotate(${angle}deg)`;
                canvas.appendChild(line);
            });
        }

        document.getElementById('addBoardModuleBtn')?.addEventListener('click', () => {
            const name = prompt('输入梦境名称', '新梦境');
            if (!name) return;
            const id = 'board_' + Date.now();
            boards.push({ id, name, notes: [], connections: [] });
            currentBoardId = id;
            renderBoardList();
            renderCurrentBoard();
            saveToStorage();
        });

        document.getElementById('addNoteBtn')?.addEventListener('click', () => {
            const board = boards.find(b => b.id === currentBoardId);
            if (!board) return;
            const id = 'note_' + Date.now() + Math.random();
            board.notes.push({ id, text: '新线索', x: 100, y: 100 });
            renderCurrentBoard();
            saveToStorage();
        });

        document.getElementById('connectNotesBtn')?.addEventListener('click', () => {
            connectMode = true;
            selectedNote = null;
            alert('点击第一个线索，再点击第二个线索进行连接');
        });

        // ========== 外链相关函数 ==========
        function renderLinks() {
            const container = document.getElementById('linkGridContainer');
            if (!container) return;
            container.innerHTML = '';
            links.forEach((link, idx) => {
                const div = document.createElement('div');
                div.className = 'link-tile';
                div.innerHTML = `
                    <div class="link-icon">⌘</div>
                    <div class="link-info">
                        <a href="${escapeHtml(link.url)}" target="_blank">${escapeHtml(link.name)}</a>
                        <div>${escapeHtml(link.url)}</div>
                    </div>
                    <button class="delete-btn" onclick="deleteLink(${idx})">✕</button>
                `;
                container.appendChild(div);
            });
        }

        window.deleteLink = (index) => {
            links.splice(index, 1);
            saveToStorage();
            renderLinks();
        };

        document.getElementById('addLinkBtn')?.addEventListener('click', () => {
            const name = document.getElementById('linkNameInput').value.trim();
            let url = document.getElementById('linkUrlInput').value.trim();
            if (!name || !url) return;
            if (!url.startsWith('http')) url = 'https://' + url;
            links.push({ name, url });
            saveToStorage();
            renderLinks();
            document.getElementById('linkNameInput').value = '';
            document.getElementById('linkUrlInput').value = '';
        });

        // ========== 导入导出 ==========
        document.getElementById('exportDataBtn')?.addEventListener('click', () => {
            const exportData = { modules, characters, links, calendar, achievements, boards, keeper: keeperDisplay.textContent };
            const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `coc-${new Date().toISOString().slice(0,10)}.json`;
            a.click();
        });

        document.getElementById('importDataBtn')?.addEventListener('click', () => {
            document.getElementById('importFile').click();
        });

        document.getElementById('importFile')?.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    const imported = JSON.parse(event.target.result);
                    if (imported.modules) modules = imported.modules;
                    if (imported.characters) characters = imported.characters;
                    if (imported.links) links = imported.links;
                    if (imported.calendar) calendar = imported.calendar;
                    if (imported.achievements) achievements = imported.achievements;
                    if (imported.boards) boards = imported.boards;
                    if (imported.keeper) {
                        keeperDisplay.textContent = imported.keeper;
                        keeperInput.value = imported.keeper;
                    }
                    saveToStorage();
                    renderModules();
                    renderCharacters();
                    renderCalendar();
                    renderAchievements();
                    renderBoardList();
                    renderCurrentBoard();
                    renderLinks();
                    alert('导入成功！');
                } catch (error) {
                    alert('文件格式错误');
                }
            };
            reader.readAsText(file);
        });

        // ========== 分页切换 ==========
        const tabs = document.querySelectorAll('.tab-btn');
        const pages = document.querySelectorAll('.page');
        tabs.forEach(t => t.addEventListener('click', (e) => {
            tabs.forEach(btn => btn.classList.remove('active'));
            t.classList.add('active');
            pages.forEach(p => p.classList.remove('active-page'));
            document.getElementById(t.dataset.page + '-page').classList.add('active-page');
            
            // 刷新对应页面数据
            if (t.dataset.page === 'calendar') {
                renderCalendar();
                setTimeout(() => drawChart(), 50);
            }
            if (t.dataset.page === 'achievements') renderAchievements();
            if (t.dataset.page === 'board') {
                renderBoardList();
                renderCurrentBoard();
            }
        }));

        function escapeHtml(t) { 
            return String(t).replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
        }

        window.addEventListener('resize', () => {
            if (document.getElementById('calendar-page').classList.contains('active-page')) {
                drawChart();
            }
        });

        // 启动
        loadFromStorage();
        renderModules();
        renderCharacters();
        renderCalendar();
        renderAchievements();
        renderBoardList();
        renderCurrentBoard();
        renderLinks();
        setupMouseGlow();
    })();
</script>
</body>
</html>
